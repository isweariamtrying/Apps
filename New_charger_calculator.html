<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21S Battery Charge Calculator</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIjIxUyBCYXR0ZXJ5IENhbGN1bGF0b3IiLAogICJzaG9ydF9uYW1lIjogIjIxUyBDYWxjIiwKICAgc3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMxMmYyZiIsCiAgInRoZW1lX2NvbG9yIjogIiMxYTFhMWEiCn0=">

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ff5722; 
            --text-color: #e0e0e0;
            --green: #4caf50;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #fff;
            font-weight: 600;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-top: -10px;
            margin-bottom: 25px;
        }

        /* Fuel Gauge */
        .gauge-container {
            width: 120px;
            height: 220px;
            border: 4px solid #444;
            border-radius: 12px;
            margin: 0 auto 25px auto;
            position: relative;
            padding: 4px;
            box-sizing: border-box;
            background: #000;
        }

        .gauge-container::before {
            content: '';
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 10px;
            background: #444;
            border-radius: 4px 4px 0 0;
        }

        .gauge-fill {
            width: 100%;
            height: 0%; 
            background: linear-gradient(to top, #ff3333, #ff9900, var(--green));
            border-radius: 6px;
            position: absolute;
            bottom: 4px;
            left: 4px;
            right: 4px;
            transition: height 0.4s ease-in-out;
            max-height: calc(100% - 8px);
        }

        .gauge-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            z-index: 2;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #aaa;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #333;
            background: #111;
            color: #fff;
            font-size: 1.3rem;
            box-sizing: border-box;
            text-align: center;
        }

        input[type="number"]:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        /* Results */
        .results {
            background: #151515;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            text-align: left;
            margin-top: 20px;
        }

        .results p {
            margin: 8px 0;
            font-size: 1rem;
        }

        .highlight {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>21S Pack Charge Calc</h2>
    <div class="subtitle">Specs: 75.6V Nom | 48Ah | 5A Charger</div>

    <div class="gauge-container">
        <div class="gauge-fill" id="fuelFill"></div>
        <div class="gauge-text" id="fuelText">0%</div>
    </div>

    <div class="input-group">
        <label for="currentVolts">Current Voltage (V):</label>
        <input type="number" id="currentVolts" step="0.1" min="63.0" max="88.2" placeholder="e.g., 75.6" oninput="calculateCharge()">
    </div>

    <div class="results">
        <p>Current Capacity: <span class="highlight" id="currentPct">0%</span></p>
        <p>Target (80% / 85.0V): <span class="highlight" id="timeTo80" style="color: var(--green);">--</span></p>
    </div>
</div>

<script>
    // Real Math Constraints for 21S Li-Ion Pack
    const V_MIN = 63.0; // 3.0V per cell
    const V_MAX = 88.2; // 4.2V per cell
    const TOTAL_AH = 48.0;
    const CHARGE_AMPS = 5.0;
    const TARGET_PCT = 80; 

    // Inline service worker for PWA support
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGZ1bmN0aW9uKGUpIHt9KTs=');
    }

    function calculateCharge() {
        const volts = parseFloat(document.getElementById('currentVolts').value);
        
        const fuelFill = document.getElementById('fuelFill');
        const fuelText = document.getElementById('fuelText');
        const currentPctText = document.getElementById('currentPct');
        const timeTo80Text = document.getElementById('timeTo80');

        if (isNaN(volts) || volts < V_MIN) {
            fuelFill.style.height = '0%';
            fuelText.innerText = '0%';
            currentPctText.innerText = '0%';
            timeTo80Text.innerText = '--';
            return;
        }

        if (volts > V_MAX) {
            fuelFill.style.height = '100%';
            fuelText.innerText = '100%';
            currentPctText.innerText = '100%';
            timeTo80Text.innerText = 'Past 80%';
            return;
        }

        // Calculate actual State of Charge % based on the 21S voltage scale
        let totalPct = ((volts - V_MIN) / (V_MAX - V_MIN)) * 100;
        totalPct = Math.max(0, Math.min(100, totalPct)); 

        // Update Gauge
        fuelFill.style.height = totalPct + '%';
        fuelText.innerText = Math.round(totalPct) + '%';
        currentPctText.innerText = Math.round(totalPct) + '%';

        // Calculate time to reach 80% capacity
        if (totalPct >= TARGET_PCT) {
            timeTo80Text.innerText = 'At or past 80%';
        } else {
            let currentAh = (totalPct / 100) * TOTAL_AH;
            let targetAh = (TARGET_PCT / 100) * TOTAL_AH;
            let ahNeeded = targetAh - currentAh;
            
            let hoursNeeded = ahNeeded / CHARGE_AMPS;
            
            let hrs = Math.floor(hoursNeeded);
            let mins = Math.round((hoursNeeded - hrs) * 60);
            
            if (hrs === 0) {
                timeTo80Text.innerText = `${mins} mins to reach 80%`;
            } else {
                timeTo80Text.innerText = `${hrs} hr ${mins} mins to reach 80%`;
            }
        }
    }
</script>

</body>
</html>
